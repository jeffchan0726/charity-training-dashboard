<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeff 減脂 Recomp 挑戰 • 多用戶版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; }
        .charity-header { background: linear-gradient(135deg, #166534 0%, #4ade80 100%); }
        .section-card { background: #1c1917; border: 1px solid #44403c; }
        .nav-tab.active { background-color: #166534; color: white; }
    </style>
</head>
<body class="bg-[#1c1917] text-[#e7e5e4]">

    <!-- Header -->
    <div class="charity-header text-white">
        <div class="max-w-7xl mx-auto px-6 py-5">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">Jeff 減脂 Recomp 挑戰</h1>
                    <p class="text-green-100 text-sm">多用戶訓練記錄系統</p>
                </div>
                
                <div class="flex items-center gap-x-3">
                    <div id="currentUserDisplay" class="bg-white/20 px-4 py-1.5 rounded-2xl text-sm flex items-center gap-x-2 hidden">
                        <i class="fa-solid fa-user"></i>
                        <span id="currentUserName"></span>
                    </div>
                    
                    <button id="loginBtn" onclick="showLoginModal()" class="px-4 py-1.5 bg-white text-[#166534] font-semibold rounded-2xl text-sm">
                        登入
                    </button>
                    <button id="logoutBtn" onclick="logoutUser()" class="px-4 py-1.5 bg-white/20 hover:bg-white/30 rounded-2xl text-sm hidden">
                        登出
                    </button>
                    
                    <button onclick="showAddUserModal()" class="px-4 py-1.5 bg-white/20 hover:bg-white/30 rounded-2xl text-sm">新增用戶</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 pt-6 pb-12">

        <!-- Navigation -->
        <div class="flex flex-wrap gap-2 mb-8 border-b border-[#44403c] pb-4">
            <button onclick="switchTab('overview')" id="tab-overview" class="nav-tab active px-5 py-2 rounded-2xl text-sm font-semibold bg-[#166534] text-white flex items-center gap-x-2">
                <i class="fa-solid fa-home"></i> <span>概覽</span>
            </button>
            <button onclick="switchTab('sponsor')" id="tab-sponsor" class="nav-tab px-5 py-2 rounded-2xl text-sm font-semibold flex items-center gap-x-2 hover:bg-[#292524]">
                <i class="fa-solid fa-trophy"></i> <span>金主排行榜</span>
            </button>
            <button onclick="switchTab('log')" id="tab-log" class="nav-tab px-5 py-2 rounded-2xl text-sm font-semibold flex items-center gap-x-2 hover:bg-[#292524]">
                <i class="fa-solid fa-clipboard-list"></i> <span>Workout Log</span>
            </button>
        </div>

        <!-- 內容區域 -->
        <div id="content-overview" class="tab-content">
            <div class="text-center py-12 text-[#a8a29e]">概覽頁面</div>
        </div>

        <div id="content-sponsor" class="tab-content hidden">
            <div class="text-center py-12 text-[#a8a29e]">金主排行榜</div>
        </div>

        <div id="content-log" class="tab-content hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xl">Workout Log <span id="logUserName" class="text-[#4ade80]"></span></h3>
                <button onclick="showAddLogModal()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i> 新增記錄
                </button>
            </div>

            <div class="section-card rounded-3xl overflow-hidden border border-[#44403c]">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-[#57534e]">
                            <th class="py-3 px-5 text-left">日期</th>
                            <th class="py-3 px-4">動作</th>
                            <th class="py-3 px-4 text-center">組數</th>
                            <th class="py-3 px-4 text-center">次數</th>
                            <th class="py-3 px-4 text-center">重量 (kg)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="divide-y divide-[#44403c]"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-[#1c1917] border border-[#44403c] rounded-3xl w-full max-w-md p-6">
            <h3 class="font-bold text-xl mb-4">用戶登入</h3>
            <div class="space-y-4">
                <input type="text" id="loginUsername" placeholder="用戶名稱" class="w-full bg-[#292524] border border-[#57534e] rounded-2xl px-4 py-2.5 text-sm">
                <input type="password" id="loginPin" placeholder="PIN 碼" class="w-full bg-[#292524] border border-[#57534e] rounded-2xl px-4 py-2.5 text-sm">
            </div>
            <div class="flex gap-x-3 mt-6">
                <button onclick="hideLoginModal()" class="flex-1 py-2.5 rounded-2xl border border-[#57534e]">取消</button>
                <button onclick="loginUser()" class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">登入</button>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="addUserModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-[#1c1917] border border-[#44403c] rounded-3xl w-full max-w-md p-6">
            <h3 class="font-bold text-xl mb-4">新增用戶</h3>
            <div class="space-y-4">
                <input type="text" id="newUsername" placeholder="用戶名稱" class="w-full bg-[#292524] border border-[#57534e] rounded-2xl px-4 py-2.5 text-sm">
                <input type="password" id="newPin" placeholder="設定 PIN 碼" class="w-full bg-[#292524] border border-[#57534e] rounded-2xl px-4 py-2.5 text-sm">
            </div>
            <div class="flex gap-x-3 mt-6">
                <button onclick="hideAddUserModal()" class="flex-1 py-2.5 rounded-2xl border border-[#57534e]">取消</button>
                <button onclick="addNewUser()" class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">建立用戶</button>
            </div>
        </div>
    </div>

    <!-- Add Log Modal -->
    <div id="addLogModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-[#1c1917] border border-[#44403c] rounded-3xl w-full max-w-md p-6">
            <h3 class="font-bold mb-4">新增 Workout Log</h3>
            <div class="space-y-3">
                <input type="date" id="logDate" class="w-full bg-[#292524] border border-[#57534e] rounded-2xl px-4 py-2 text-sm">
                <input type="text" id="logExercise" placeholder="動作名稱" class="w-full bg-[#292524] border border-[#57534e] rounded-2xl px-4 py-2 text-sm">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="logSets" placeholder="組數" value="3" class="bg-[#292524] border border-[#57534e] rounded-2xl px-3 py-2 text-sm">
                    <input type="text" id="logReps" placeholder="次數" class="bg-[#292524] border border-[#57534e] rounded-2xl px-3 py-2 text-sm">
                    <input type="number" id="logWeight" placeholder="重量 (kg)" class="bg-[#292524] border border-[#57534e] rounded-2xl px-3 py-2 text-sm">
                </div>
            </div>
            <div class="flex gap-x-3 mt-5">
                <button onclick="hideAddLogModal()" class="flex-1 py-2.5 rounded-2xl border border-[#57534e]">取消</button>
                <button onclick="addNewLog()" class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">儲存</button>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhdwkW7y-xmQ1UT1nvSzi5kP4v838Hs7AQzQ6LxuKdUovY3ubdBMtGJMcSbWWivELm/exec";

        let currentUser = null;
        let workoutLogs = [];

        async function callAppsScript(action, data = {}) {
            try {
                if (action === "getLogs" && currentUser) {
                    const url = new URL(APPS_SCRIPT_URL);
                    url.searchParams.append("action", "getLogs");
                    url.searchParams.append("user", currentUser);
                    const res = await fetch(url);
                    return await res.json();
                }

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action, ...data })
                });
                return await response.json();
            } catch (error) {
                console.error(error);
                alert("連接 Apps Script 失敗，請檢查 URL 或網絡");
                return { status: "error" };
            }
        }

        function updateUIAfterLogin() {
            document.getElementById('currentUserDisplay').classList.remove('hidden');
            document.getElementById('currentUserName').textContent = currentUser;
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('logUserName').textContent = `(${currentUser})`;
        }

        function showLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('loginModal').classList.add('flex');
        }

        function hideLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('loginModal').classList.remove('flex');
        }

        async function loginUser() {
            const username = document.getElementById('loginUsername').value.trim();
            const pin = document.getElementById('loginPin').value.trim();

            if (!username || !pin) {
                alert("請輸入用戶名稱同 PIN");
                return;
            }

            // 呼叫後端驗證
            const result = await callAppsScript("login", { user: username, pin: pin });

            if (result.status === "success") {
                currentUser = username;
                localStorage.setItem('currentUser', currentUser);
                hideLoginModal();
                updateUIAfterLogin();
                await loadUserLogs();
            } else {
                alert("登入失敗，請檢查用戶名稱或 PIN");
            }
        }

        function logoutUser() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            workoutLogs = [];
            
            document.getElementById('currentUserDisplay').classList.add('hidden');
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('logUserName').textContent = "";
            
            renderLogTable();
        }

        async function loadUserLogs() {
            if (!currentUser) return;
            workoutLogs = await callAppsScript("getLogs");
            renderLogTable();
        }

        function renderLogTable() {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';

            if (!currentUser) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-[#a8a29e]">請先登入</td></tr>`;
                return;
            }

            const myLogs = workoutLogs.filter(log => log.user === currentUser);
            
            if (myLogs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-[#a8a29e]">暫無記錄</td></tr>`;
                return;
            }

            myLogs.sort((a, b) => b.date.localeCompare(a.date)).forEach(log => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="py-3 px-5 text-xs">${log.date}</td>
                    <td class="py-3 px-4">${log.exercise}</td>
                    <td class="py-3 px-4 text-center">${log.sets}</td>
                    <td class="py-3 px-4 text-center">${log.reps}</td>
                    <td class="py-3 px-4 text-center">${log.weight}</td>
                    <td class="py-3 px-2 text-right">
                        <button onclick="deleteLog(${log.id})" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function showAddLogModal() {
            if (!currentUser) return alert("請先登入");
            document.getElementById('addLogModal').classList.remove('hidden');
            document.getElementById('addLogModal').classList.add('flex');
            document.getElementById('logDate').value = new Date().toISOString().split('T')[0];
        }

        function hideAddLogModal() {
            document.getElementById('addLogModal').classList.add('hidden');
            document.getElementById('addLogModal').classList.remove('flex');
        }

        async function addNewLog() {
            if (!currentUser) return;

            const newLog = {
                id: Date.now(),
                user: currentUser,
                date: document.getElementById('logDate').value,
                exercise: document.getElementById('logExercise').value,
                sets: document.getElementById('logSets').value,
                reps: document.getElementById('logReps').value,
                weight: document.getElementById('logWeight').value
            };

            if (!newLog.exercise) return alert("請輸入動作名稱");

            await callAppsScript("addLog", { user: currentUser, log: newLog });
            hideAddLogModal();
            await loadUserLogs();
        }

        async function deleteLog(logId) {
            if (!confirm("確定刪除？")) return;
            await callAppsScript("deleteLog", { user: currentUser, logId: logId });
            await loadUserLogs();
        }

        function showAddUserModal() {
            document.getElementById('addUserModal').classList.remove('hidden');
            document.getElementById('addUserModal').classList.add('flex');
        }

        function hideAddUserModal() {
            document.getElementById('addUserModal').classList.add('hidden');
            document.getElementById('addUserModal').classList.remove('flex');
        }

        async function addNewUser() {
            const username = document.getElementById('newUsername').value.trim();
            const pin = document.getElementById('newPin').value.trim();

            if (!username || !pin) return alert("請輸入用戶名稱同 PIN");

            const result = await callAppsScript("addUser", { user: username, pin: pin });

            if (result.status === "success") {
                alert(`用戶 ${username} 已建立！`);
                hideAddUserModal();
            } else {
                alert("建立用戶失敗");
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active', 'bg-[#166534]', 'text-white'));
            
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active', 'bg-[#166534]', 'text-white');
        }

        async function initialize() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = savedUser;
                document.getElementById('currentUserDisplay').classList.remove('hidden');
                document.getElementById('currentUserName').textContent = currentUser;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('logUserName').textContent = `(${currentUser})`;
                await loadUserLogs();
            }
            
            document.getElementById('content-overview').classList.remove('hidden');
            document.getElementById('tab-overview').classList.add('active', 'bg-[#166534]', 'text-white');
        }

        window.onload = initialize;
    </script>
</body>
</html>
