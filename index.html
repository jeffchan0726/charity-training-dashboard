<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeff 減脂 Recomp 挑戰 • 慈善賽訓練中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; }
        .charity-header { background: linear-gradient(135deg, #166534 0%, #4ade80 100%); }
        .section-card { background: #1c1917; border: 1px solid #44403c; }
        .nav-tab.active { background-color: #166534; color: white; }
        .accent-green { color: #4ade80; }

        .rocket, .firework, .sportscar {
            position: absolute;
            z-index: 9999;
            pointer-events: none;
        }
        @keyframes flyRocket {
            0% { transform: translateY(0) rotate(-25deg); opacity: 1; }
            100% { transform: translateY(-130vh) rotate(-25deg); opacity: 0; }
        }
        @keyframes explode {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        @keyframes driveCar {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(120vw); }
        }
    </style>
</head>
<body class="bg-[#1c1917] text-[#e7e5e4]">

    <!-- Header -->
    <div class="charity-header text-white">
        <div class="max-w-7xl mx-auto px-6 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center border border-white/30">
                        <i class="fa-solid fa-heart text-4xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold">Jeff 減脂 Recomp 挑戰</h1>
                        <p class="text-green-100">慈善賽訓練中心 • 朋友監督 + 支持計劃</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-3 text-sm">
                    <div class="bg-white/20 px-4 py-1.5 rounded-2xl border border-white/30 flex items-center gap-x-2">
                        <i class="fa-solid fa-heart"></i>
                        <span>一起為善而戰</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 pt-6 pb-12">

        <!-- Navigation -->
        <div class="flex flex-wrap gap-2 mb-8 border-b border-[#44403c] pb-4">
            <button onclick="switchTab('overview')" id="tab-overview" class="nav-tab active px-5 py-2 rounded-2xl text-sm font-semibold bg-[#166534] text-white flex items-center gap-x-2">
                <i class="fa-solid fa-home"></i> <span>概覽</span>
            </button>
            <button onclick="switchTab('sponsor'); launchBigShow();" id="tab-sponsor" class="nav-tab px-5 py-2 rounded-2xl text-sm font-semibold flex items-center gap-x-2 hover:bg-[#292524]">
                <i class="fa-solid fa-trophy"></i> <span>金主排行榜</span>
            </button>
            <button onclick="switchTab('body')" id="tab-body" class="nav-tab px-5 py-2 rounded-2xl text-sm font-semibold flex items-center gap-x-2 hover:bg-[#292524]">
                <i class="fa-solid fa-chart-line"></i> <span>身體組成</span>
            </button>
            <button onclick="switchTab('daily')" id="tab-daily" class="nav-tab px-5 py-2 rounded-2xl text-sm font-semibold flex items-center gap-x-2 hover:bg-[#292524]">
                <i class="fa-solid fa-clock"></i> <span>每日時間表</span>
            </button>
            <button onclick="switchTab('training')" id="tab-training" class="nav-tab px-5 py-2 rounded-2xl text-sm font-semibold flex items-center gap-x-2 hover:bg-[#292524]">
                <i class="fa-solid fa-dumbbell"></i> <span>訓練計劃</span>
            </button>
            <button onclick="switchTab('log')" id="tab-log" class="nav-tab px-5 py-2 rounded-2xl text-sm font-semibold flex items-center gap-x-2 hover:bg-[#292524]">
                <i class="fa-solid fa-clipboard-list"></i> <span>訓練日誌</span>
            </button>
        </div>

        <!-- 金主排行榜 Tab -->
        <div id="content-sponsor" class="tab-content">
            <div class="section-card rounded-3xl p-8 border border-[#44403c] relative">
                <h2 class="text-4xl font-bold mb-8 text-center flex items-center justify-center gap-x-3">
                    <i class="fa-solid fa-trophy text-[#fbbf24]"></i>
                    <span>金主排行榜</span>
                    <i class="fa-solid fa-trophy text-[#fbbf24]"></i>
                </h2>

                <div class="max-w-2xl mx-auto space-y-4">
                    <!-- Top Donors -->
                    <div class="flex justify-between items-center bg-gradient-to-r from-yellow-500/20 to-transparent px-8 py-5 rounded-3xl border border-yellow-500/30">
                        <div class="flex items-center gap-x-4">
                            <span class="text-4xl">🥇</span>
                            <span class="font-bold text-2xl">Aly</span>
                        </div>
                        <span class="text-3xl font-bold text-yellow-400">HK$888</span>
                    </div>

                    <div class="flex justify-between items-center bg-gradient-to-r from-gray-400/20 to-transparent px-8 py-5 rounded-3xl border border-gray-400/30">
                        <div class="flex items-center gap-x-4">
                            <span class="text-4xl">🥈</span>
                            <span class="font-bold text-2xl">Bon</span>
                        </div>
                        <span class="text-3xl font-bold text-gray-300">HK$666</span>
                    </div>

                    <div class="flex justify-between items-center bg-gradient-to-r from-orange-500/20 to-transparent px-8 py-5 rounded-3xl border border-orange-500/30">
                        <div class="flex items-center gap-x-4">
                            <span class="text-4xl">🥉</span>
                            <span class="font-bold text-2xl">Fan</span>
                        </div>
                        <span class="text-3xl font-bold text-orange-400">HK$520</span>
                    </div>

                    <div class="flex justify-between items-center bg-[#292524] px-8 py-4 rounded-3xl">
                        <div class="flex items-center gap-x-4">
                            <span class="text-2xl">4</span>
                            <span class="font-bold text-xl">William</span>
                        </div>
                        <span class="text-2xl font-bold text-emerald-400">HK$388</span>
                    </div>

                    <div class="flex justify-between items-center bg-[#292524] px-8 py-4 rounded-3xl">
                        <div class="flex items-center gap-x-4">
                            <span class="text-2xl">5</span>
                            <span class="font-bold text-xl">奇異果</span>
                        </div>
                        <span class="text-2xl font-bold text-emerald-400">HK$168</span>
                    </div>

                    <div class="flex justify-between items-center bg-[#292524] px-8 py-4 rounded-3xl">
                        <div class="flex items-center gap-x-4">
                            <span class="text-2xl">6</span>
                            <span class="font-bold text-xl">+× wrong⁩</span>
                        </div>
                        <span class="text-2xl font-bold text-emerald-400">HK$66.6</span>
                    </div>
                </div>

                <!-- PayCode -->
                <div class="mt-10 flex justify-center">
                    <div class="bg-[#292524] rounded-3xl p-8 text-center max-w-xs w-full">
                        <p class="text-xl mb-4 font-medium">支持 Jeff，一起為善而戰</p>
                        <div class="w-56 h-56 mx-auto bg-white rounded-2xl p-4">
                            <img src="paycode.png" alt="Jeff PayCode" class="w-full h-full object-contain">
                        </div>
                        <p class="text-sm text-[#a8a29e] mt-4">一掃 PayCode，立即過數</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Other tabs (simplified) -->
        <div id="content-overview" class="tab-content hidden">
            <div class="text-center py-12 text-[#a8a29e]">概覽頁面（可自訂）</div>
        </div>
        <div id="content-body" class="tab-content hidden">
            <div class="text-center py-12 text-[#a8a29e]">身體組成圖表</div>
        </div>
        <div id="content-daily" class="tab-content hidden">
            <div class="text-center py-12 text-[#a8a29e]">每日時間表</div>
        </div>
        <div id="content-training" class="tab-content hidden">
            <div class="text-center py-12 text-[#a8a29e]">訓練計劃</div>
        </div>
        <div id="content-log" class="tab-content hidden">
            <div class="text-center py-12 text-[#a8a29e]">訓練日誌</div>
        </div>

    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active', 'bg-[#166534]', 'text-white'));
            
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active', 'bg-[#166534]', 'text-white');
        }

        // 超誇張大秀：火箭 + 煙花 + 跑車
        function launchBigShow() {
            // 火箭
            for (let i = 0; i < 15; i++) {
                setTimeout(() => createRocket(), i * 60);
            }
            // 煙花
            for (let i = 0; i < 8; i++) {
                setTimeout(() => createFirework(), i * 280);
            }
            // 跑車
            for (let i = 0; i < 5; i++) {
                setTimeout(() => createSportCar(), i * 420);
            }
        }

        function createRocket() {
            const rocket = document.createElement('div');
            rocket.className = 'rocket';
            rocket.innerHTML = '🚀';
            rocket.style.left = Math.random() * window.innerWidth + 'px';
            rocket.style.bottom = '-60px';
            rocket.style.fontSize = (Math.random() * 2 + 2) + 'rem';
            rocket.style.animation = `flyRocket ${Math.random() * 1.1 + 1.4}s linear forwards`;
            document.body.appendChild(rocket);
            setTimeout(() => rocket.remove(), 3000);
        }

        function createFirework() {
            const colors = ['#ef4444', '#facc15', '#22c55e', '#3b82f6', '#ec4899'];
            const fw = document.createElement('div');
            fw.className = 'firework';
            fw.style.left = Math.random() * window.innerWidth + 'px';
            fw.style.top = (Math.random() * 300 + 150) + 'px';
            fw.style.fontSize = '2.5rem';
            fw.innerHTML = '🎆';
            fw.style.color = colors[Math.floor(Math.random() * colors.length)];
            fw.style.animation = 'explode 1.2s ease-out forwards';
            document.body.appendChild(fw);
            setTimeout(() => fw.remove(), 1500);
        }

        function createSportCar() {
            const car = document.createElement('div');
            car.className = 'sportscar';
            car.innerHTML = '🏎️';
            car.style.bottom = (Math.random() * 120 + 80) + 'px';
            car.style.left = '-120px';
            car.style.fontSize = (Math.random() * 1.5 + 2.5) + 'rem';
            car.style.animation = `driveCar ${Math.random() * 1.8 + 2.2}s linear forwards`;
            document.body.appendChild(car);
            setTimeout(() => car.remove(), 4500);
        }

        function initialize() {
            document.getElementById('content-overview').classList.remove('hidden');
            document.getElementById('tab-overview').classList.add('active', 'bg-[#166534]', 'text-white');
        }

        window.onload = initialize;
    </script>
</body>
</html>
